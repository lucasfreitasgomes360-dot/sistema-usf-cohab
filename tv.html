<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV USF COHAB</title>
    <style>
        :root { --primary: #002b5c; --accent: #ffcc00; --red: #d9534f; --bg-aviso: #002b5c; }
        body { margin: 0; background: var(--primary); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 6px solid var(--accent); background: #fff; color: var(--primary); }
        .container { flex: 1; display: flex; overflow: hidden; }
        .main-call { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #nome { font-size: 8rem; color: var(--accent); font-weight: 900; text-align: center; padding: 0 20px; }
        .box { background: white; color: var(--primary); padding: 15px 60px; border-radius: 50px; font-size: 3.5rem; font-weight: 900; margin-top: 20px; text-transform: uppercase; }
        .history-panel { flex: 1; background: rgba(0,0,0,0.2); padding: 10px; border-left: 2px solid rgba(255,255,255,0.1); }
        .hist-item { background: white; color: var(--primary); margin-bottom: 10px; padding: 15px; border-radius: 12px; }
        .aviso-overlay { position: absolute; inset: 0; background: var(--bg-aviso); display: none; align-items: center; justify-content: center; z-index: 10; }
        .aviso-card { background: white; color: #333; width: 85%; padding: 40px; border-radius: 20px; text-align: center; position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 10px; background: #28a745; width: 100%; transition: width 8s linear; }
    </style>
</head>
<body>
    <div class="header">
        <div><h1 style="margin:0; font-size:2rem;">USF COHAB</h1><small style="color:var(--red); font-weight:bold;">DR. JOÃO PEREIRA DA ROSA</small></div>
        <div id="relogio" style="font-size: 2.5rem; font-weight: 900;">00:00:00</div>
    </div>
    <div class="container">
        <div class="main-call">
            <h1 id="nome">AGUARDANDO</h1>
            <div class="box" id="local">SISTEMA ATIVO</div>
            <div class="aviso-overlay" id="tela-aviso">
                <div class="aviso-card">
                    <div class="progress-bar" id="p-bar"></div>
                    <div style="font-size: 3rem; font-weight: bold; margin-top: 20px;" id="txt-aviso"></div>
                </div>
            </div>
        </div>
        <div class="history-panel" id="historico"><div style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:15px;">ÚLTIMAS CHAMADAS</div></div>
    </div>
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = { databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));
        const inicio = Date.now();
        let fila = [], falando = false, avisos = [], idxA = 0;

        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
        onValue(ref(db, 'config/corAviso'), (s) => { if(s.val()) document.documentElement.style.setProperty('--bg-aviso', s.val()); });

        onChildAdded(ref(db, 'fila'), (s) => { 
            if (s.val().timestamp > inicio) { fila.push(s.val()); processar(); }
        });

        async function processar() {
            if (falando || fila.length === 0) return;
            falando = true;
            document.getElementById('tela-aviso').style.display = 'none';
            const d = fila.shift();
            
            document.getElementById('nome').innerText = d.nome;
            document.getElementById('local').innerText = d.local;
            
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<b style="font-size:1.5rem">${d.nome}</b><br><small style="color:red; font-weight:bold">${d.local}</small>`;
            const p = document.getElementById('historico');
            p.insertBefore(item, p.childNodes[1]);
            if(p.children.length > 5) p.removeChild(p.lastChild);

            document.getElementById('bell').play();

            setTimeout(() => {
                let loc = d.local.toUpperCase();
                let prep = "ao";
                if (loc.includes("TRIAGEM") || loc.includes("RECEPÇÃO") || loc.includes("SALA") || loc.includes("ODONTOLOGIA") || loc.includes("VACINA")) {
                    prep = "à";
                }

                let texto = "";
                if (d.tipo === 'SENHA') {
                    let tipo = d.subtipo === 'PREF' ? 'preferencial' : d.subtipo === 'COLETA' ? 'de coleta' : 'normal';
                    texto = `Atenção, senha ${tipo} número ${d.nome}. Por favor, dirija-se ${prep} ${d.local}`;
                } else {
                    texto = `Atenção, paciente ${d.nome}. Por favor, dirija-se ${prep} ${d.local}`;
                }

                const v = new SpeechSynthesisUtterance(texto);
                v.lang = 'pt-BR';
                v.rate = 0.9;
                v.onend = () => { setTimeout(() => { falando = false; if(fila.length > 0) processar(); else rotate(); }, 2000); };
                window.speechSynthesis.speak(v);
            }, 1200);
        }

        onValue(ref(db, 'avisos'), (s) => { avisos = []; s.forEach(a => avisos.push(a.val())); if(!falando) rotate(); });

        function rotate() {
            if(falando || avisos.length === 0) { document.getElementById('tela-aviso').style.display='none'; return; }
            document.getElementById('tela-aviso').style.display = 'flex';
            document.getElementById('txt-aviso').innerText = avisos[idxA].texto;
            const bar = document.getElementById('p-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 100);
            setTimeout(() => { idxA = (idxA + 1) % avisos.length; if(!falando) rotate(); }, 8100);
        }
    </script>
</body>
</html>
