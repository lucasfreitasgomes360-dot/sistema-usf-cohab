<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV USF COHAB</title>
    <style>
        :root { 
            --primary: #002b5c; 
            --accent: #ffcc00; 
            --red: #d9534f; 
            --cor-dinamica: #28a745; /* Cor padrão inicial */
        }
        body { margin: 0; background: var(--primary); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Cabeçalho */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 6px solid var(--accent); background: #fff; color: var(--primary); }
        
        .container { flex: 1; display: flex; overflow: hidden; }
        
        /* Área Principal de Chamada */
        .main-call { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #nome { font-size: 8rem; color: var(--accent); font-weight: 900; text-align: center; padding: 0 20px; text-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        .box { background: white; color: var(--primary); padding: 15px 60px; border-radius: 50px; font-size: 3.5rem; font-weight: 900; margin-top: 20px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Painel Lateral de Histórico */
        .history-panel { flex: 1; background: rgba(0,0,0,0.2); padding: 15px; border-left: 2px solid rgba(255,255,255,0.1); }
        .hist-item { background: white; color: var(--primary); margin-bottom: 12px; padding: 15px; border-radius: 12px; border-left: 8px solid var(--accent); animation: slideHist 0.5s ease; }
        @keyframes slideHist { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Overlay de Avisos Modernizado */
        .aviso-overlay { position: absolute; inset: 0; background: rgba(0,43,92,0.85); display: none; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        
        .aviso-card { 
            background: white; 
            color: #333; 
            width: 80%; 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-bottom: 15px solid var(--cor-dinamica); /* Borda inferior com a cor da gerência */
        }
        
        .progress-bar { 
            position: absolute; 
            top: 0; 
            left: 0; 
            height: 12px; 
            background: var(--cor-dinamica); /* Barra com a cor da gerência */
            width: 100%; 
            border-radius: 30px 30px 0 0;
            transition: width 8s linear; 
        }

        #txt-aviso { font-size: 3.5rem; font-weight: 800; color: var(--primary); line-height: 1.2; margin-top: 10px; }
        .aviso-label { font-size: 1rem; font-weight: 900; color: var(--cor-dinamica); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div><h1 style="margin:0; font-size:2rem;">USF COHAB</h1><small style="color:var(--red); font-weight:bold;">DR. JOÃO PEREIRA DA ROSA</small></div>
        <div id="relogio" style="font-size: 2.5rem; font-weight: 900;">00:00:00</div>
    </div>
    
    <div class="container">
        <div class="main-call">
            <h1 id="nome">AGUARDANDO</h1>
            <div class="box" id="local">SISTEMA ATIVO</div>
            
            <div class="aviso-overlay" id="tela-aviso">
                <div class="aviso-card">
                    <div class="progress-bar" id="p-bar"></div>
                    <span class="aviso-label">Informativo Importante</span>
                    <div id="txt-aviso"></div>
                </div>
            </div>
        </div>

        <div class="history-panel" id="historico">
            <div style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:15px; text-transform:uppercase; font-size:0.8rem; letter-spacing:1px;">Últimas Chamadas</div>
        </div>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = { databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));
        const inicio = Date.now();
        let fila = [], falando = false, avisos = [], idxA = 0;

        // Atualiza Relógio
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

        // ESCUTA A COR DA GERÊNCIA
        onValue(ref(db, 'config/corAviso'), (s) => { 
            if(s.val()) document.documentElement.style.setProperty('--cor-dinamica', s.val()); 
        });

        // Escuta novas chamadas
        onChildAdded(ref(db, 'fila'), (s) => { 
            if (s.val().timestamp > inicio) { fila.push(s.val()); processar(); }
        });

        async function processar() {
            if (falando || fila.length === 0) return;
            falando = true;
            document.getElementById('tela-aviso').style.display = 'none';
            const d = fila.shift();
            
            document.getElementById('nome').innerText = d.nome;
            document.getElementById('local').innerText = d.local;
            
            // Adiciona ao Histórico Lateral
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<b style="font-size:1.6rem">${d.nome}</b><br><span style="color:var(--red); font-size:0.9rem; font-weight:800">${d.local}</span>`;
            const p = document.getElementById('historico');
            p.insertBefore(item, p.childNodes[1]);
            if(p.children.length > 6) p.removeChild(p.lastChild);

            document.getElementById('bell').play();

            setTimeout(() => {
                let loc = d.local.toUpperCase();
                let prep = "ao";
                if (loc.includes("TRIAGEM") || loc.includes("RECEPÇÃO") || loc.includes("SALA") || loc.includes("ODONTOLOGIA") || loc.includes("VACINA")) {
                    prep = "à";
                }

                let texto = (d.tipo === 'SENHA') 
                    ? `Atenção, senha ${d.subtipo === 'PREF' ? 'preferencial' : d.subtipo === 'COLETA' ? 'de coleta' : 'normal'} número ${d.nome}. Por favor, dirija-se ${prep} ${d.local}`
                    : `Atenção, paciente ${d.nome}. Por favor, dirija-se ${prep} ${d.local}`;

                const v = new SpeechSynthesisUtterance(texto);
                v.lang = 'pt-BR';
                v.rate = 0.85;
                v.onend = () => { setTimeout(() => { falando = false; if(fila.length > 0) processar(); else rotate(); }, 2000); };
                window.speechSynthesis.speak(v);
            }, 1200);
        }

        // Sistema de Rodízio de Avisos
        onValue(ref(db, 'avisos'), (s) => { 
            avisos = []; s.forEach(a => avisos.push(a.val())); 
            if(!falando) rotate(); 
        });

        function rotate() {
            if(falando || avisos.length === 0) { document.getElementById('tela-aviso').style.display='none'; return; }
            document.getElementById('tela-aviso').style.display = 'flex';
            document.getElementById('txt-aviso').innerText = avisos[idxA].texto;
            
            const bar = document.getElementById('p-bar');
            bar.style.transition = 'none'; 
            bar.style.width = '100%';
            
            setTimeout(() => { 
                bar.style.transition = 'width 8s linear'; 
                bar.style.width = '0%'; 
            }, 100);

            setTimeout(() => { 
                idxA = (idxA + 1) % avisos.length; 
                if(!falando) rotate(); 
            }, 8100);
        }
    </script>
</body>
</html>
