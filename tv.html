<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF COHAB</title>
    <style>
        :root { --primary: #002b5c; --accent: #ffcc00; --red: #d9534f; --gray: #f8f9fa; }
        body { margin: 0; background: var(--primary); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Cabeçalho */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 6px solid var(--accent); background: #fff; color: var(--primary); z-index: 5; }
        .header h1 { margin: 0; font-size: 2.2rem; font-weight: 900; }
        .header h2 { margin: 0; font-size: 1.1rem; color: var(--red); font-weight: bold; }
        .time { font-size: 2.8rem; font-weight: 900; }

        /* Estrutura Principal: Chamada + Histórico */
        .container { flex: 1; display: flex; overflow: hidden; }

        /* Área da Chamada Atual */
        .main-call { flex: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-right: 2px solid rgba(255,255,255,0.1); }
        #nome { font-size: 8rem; color: var(--accent); font-weight: 900; margin: 0; text-transform: uppercase; text-shadow: 4px 4px 15px rgba(0,0,0,0.6); text-align: center; }
        .box { background: white; color: var(--primary); padding: 15px 60px; border-radius: 50px; font-size: 3.5rem; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); text-transform: uppercase; }

        /* Barra Lateral de Histórico */
        .history-panel { flex: 1; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; padding: 10px; }
        .history-title { text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--accent); padding: 10px 0; border-bottom: 2px solid var(--accent); margin-bottom: 10px; }
        .hist-item { background: white; color: var(--primary); margin-bottom: 10px; padding: 15px; border-radius: 12px; animation: slideIn 0.5s ease-out; }
        .hist-nome { font-size: 1.8rem; font-weight: 900; display: block; }
        .hist-local { font-size: 1rem; font-weight: bold; color: var(--red); text-transform: uppercase; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Avisos (Sobrepõe apenas a área de chamada) */
        .aviso-overlay { position: absolute; top: 0; bottom: 0; left: 0; right: 0; background: var(--primary); display: none; align-items: center; justify-content: center; z-index: 10; }
        .aviso-card { background: white; color: #333; width: 85%; padding: 40px; border-radius: 20px; text-align: center; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: #eee; }
        .progress-bar { height: 100%; background: #28a745; width: 100%; }
        .aviso-txt { font-size: 3rem; font-weight: bold; margin-top: 20px; }

        .footer { height: 50px; background: rgba(0,0,0,0.5); display: flex; align-items: center; padding: 0 40px; font-size: 1rem; color: #ccc; }
    </style>
</head>
<body>
    <div class="header">
        <div><h1>USF COHAB</h1><h2>Dr. João Pereira da Rosa</h2></div>
        <div class="time" id="relogio">00:00:00</div>
    </div>

    <div class="container">
        <div class="main-call">
            <h1 id="nome">AGUARDANDO</h1>
            <div class="box" id="local">SISTEMA ATIVO</div>

            <div class="aviso-overlay" id="tela-aviso">
                <div class="aviso-card">
                    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
                    <div style="color:#28a745; font-size:1.2rem; font-weight:bold; margin-top:10px;">INFORMATIVO</div>
                    <div class="aviso-txt" id="txt-aviso"></div>
                </div>
            </div>
        </div>

        <div class="history-panel" id="historico">
            <div class="history-title">ÚLTIMAS CHAMADAS</div>
            </div>
    </div>

    <div class="footer">Lucas Freitas Gomes © 2026 | USF COHAB</div>
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyA5tayYNLD_P_ZnlWhst81Dkuz8gDv7vPU",
            authDomain: "sistema-usf-cohab.firebaseapp.com",
            databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com",
            projectId: "sistema-usf-cohab",
            storageBucket: "sistema-usf-cohab.firebasestorage.app",
            messagingSenderId: "184566338840",
            appId: "1:184566338840:web:995a701e4c787be2927a6d"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        const horaDeAbertura = Date.now();
        let fila = [], falando = false, avisos = [], idxA = 0, histItems = [];

        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

        onChildAdded(ref(db, 'fila'), (s) => { 
            const d = s.val();
            if (!d.timestamp || d.timestamp > horaDeAbertura) {
                fila.push(d); processar(); 
            }
        });

        async function processar() {
            if (falando || fila.length === 0) return;
            falando = true;
            document.getElementById('tela-aviso').style.display = 'none';
            const d = fila.shift();
            
            const textoVisual = (d.tipo === 'senha_normal' ? 'NORMAL ' : d.tipo === 'senha_pref' ? 'PREF ' : '') + d.nome;
            document.getElementById('nome').innerText = textoVisual;
            document.getElementById('local').innerText = d.local;
            
            adicionarAoHistorico(textoVisual, d.local);
            document.getElementById('bell').play();

            setTimeout(() => {
                let fala = (d.tipo === 'senha_normal' ? 'Atenção, senha ' : d.tipo === 'senha_pref' ? 'Atenção, senha preferencial ' : 'Atenção, paciente ') + d.nome;
                fala += `. Compareça ao setor ${d.local}`;
                const v = new SpeechSynthesisUtterance(fala);
                v.lang = 'pt-BR';
                v.rate = 0.85;
                v.onend = () => { 
                    setTimeout(() => { falando = false; if(fila.length > 0) processar(); else rotate(); }, 2000); 
                };
                window.speechSynthesis.speak(v);
            }, 1200);
        }

        function adicionarAoHistorico(nome, local) {
            const painel = document.getElementById('historico');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<span class="hist-nome">${nome}</span><span class="hist-local">${local}</span>`;
            
            // Insere no topo após o título
            painel.insertBefore(item, painel.childNodes[2]);
            
            // Mantém apenas as últimas 4
            if (painel.getElementsByClassName('hist-item').length > 4) {
                painel.removeChild(painel.lastChild);
            }
        }

        onValue(ref(db, 'avisos'), (s) => { avisos = []; s.forEach(a => avisos.push(a.val())); if(!falando) rotate(); });

        function rotate() {
            if(falando || avisos.length === 0) return;
            const bar = document.getElementById('p-bar');
            document.getElementById('tela-aviso').style.display = 'flex';
            document.getElementById('txt-aviso').innerText = avisos[idxA].texto;
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 100);
            setTimeout(() => { idxA = (idxA + 1) % avisos.length; if(!falando) rotate(); }, 8100);
        }
    </script>
</body>
</html>
