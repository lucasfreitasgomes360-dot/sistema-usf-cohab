<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF COHAB</title>
    <style>
        body { margin: 0; background: #002b5c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Cabeçalho */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 6px solid #ffcc00; background: #fff; color: #002b5c; }
        .header h1 { margin: 0; font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .header h2 { margin: 0; font-size: 1.3rem; color: #d9534f; font-weight: bold; }
        .time { font-size: 3.5rem; font-weight: 900; color: #002b5c; }

        /* Área Central */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #nome { font-size: 9rem; color: #ffcc00; font-weight: 900; margin: 0; text-transform: uppercase; text-shadow: 4px 4px 15px rgba(0,0,0,0.6); text-align: center; line-height: 1; }
        .box { background: white; color: #002b5c; padding: 15px 80px; border-radius: 60px; font-size: 4.5rem; font-weight: 900; margin-top: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); text-transform: uppercase; }

        /* Informativos */
        .aviso-overlay { position: absolute; top: 140px; bottom: 0; left: 0; right: 0; background: #002b5c; display: none; align-items: center; justify-content: center; z-index: 10; }
        .aviso-card { background: white; color: #333; width: 85%; padding: 60px; border-radius: 25px; text-align: center; border-left: 25px solid #28a745; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .aviso-txt { font-size: 4rem; font-weight: bold; line-height: 1.2; }

        /* Rodapé */
        .footer { height: 70px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 50px; font-size: 1.3rem; border-top: 1px solid rgba(255,255,255,0.1); color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <div><h1>USF COHAB</h1><h2>Dr. João Pereira da Rosa</h2></div>
        <div class="time" id="relogio">00:00:00</div>
    </div>

    <div class="main">
        <h1 id="nome">INICIANDO...</h1>
        <div class="box" id="local">SISTEMA ATIVO</div>
    </div>

    <div class="aviso-overlay" id="tela-aviso">
        <div class="aviso-card">
            <div style="color:#28a745; font-size:1.5rem; font-weight:bold; margin-bottom:20px; letter-spacing:3px;">INFORMATIVO</div>
            <div class="aviso-txt" id="txt-aviso"></div>
        </div>
    </div>

    <div class="footer">Lucas Freitas Gomes © 2026 | USF COHAB</div>
    
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyA5tayYNLD_P_ZnlWhst81Dkuz8gDv7vPU",
            authDomain: "sistema-usf-cohab.firebaseapp.com",
            databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com",
            projectId: "sistema-usf-cohab",
            storageBucket: "sistema-usf-cohab.firebasestorage.app",
            messagingSenderId: "184566338840",
            appId: "1:184566338840:web:995a701e4c787be2927a6d"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);

        let fila = [], falando = false, avisos = [], idxA = 0;

        // Relógio
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Monitorar fila
        onChildAdded(ref(db, 'fila'), (s) => { fila.push(s.val()); processar(); });

        async function processar() {
            if (falando || fila.length === 0) return;
            falando = true;
            document.getElementById('tela-aviso').style.display = 'none';

            const d = fila.shift();
            
            // Texto Visual na TV
            let textoVisual = d.nome;
            if(d.tipo === 'senha_normal') textoVisual = "NORMAL " + d.nome;
            if(d.tipo === 'senha_pref') textoVisual = "PREF " + d.nome;

            document.getElementById('nome').innerText = textoVisual;
            document.getElementById('local').innerText = d.local;
            
            // Tocar som
            document.getElementById('bell').play();

            // Lógica de Voz (Sem falar "normal" ou "pref")
            setTimeout(() => {
                let fala = "";
                if(d.tipo === 'senha_normal') {
                    fala = `Atenção, senha ${d.nome}.`;
                } else if(d.tipo === 'senha_pref') {
                    fala = `Atenção, senha preferencial ${d.nome}.`;
                } else {
                    fala = `Atenção, paciente ${d.nome}.`;
                }
                
                fala += ` Compareça ao setor ${d.local}`;

                const v = new SpeechSynthesisUtterance(fala);
                v.lang = 'pt-BR';
                v.rate = 0.85; // Velocidade ideal
                
                v.onend = () => { 
                    // Espera 3 segundos após falar antes de liberar para o próximo (evita atropelos)
                    setTimeout(() => { 
                        falando = false; 
                        if(fila.length > 0) processar(); 
                        else rotate(); // Volta para os avisos se a fila acabar
                    }, 3000); 
                };
                window.speechSynthesis.speak(v);
            }, 1200);
        }

        // Carrossel de Avisos
        onValue(ref(db, 'avisos'), (s) => { 
            avisos = []; 
            s.forEach(a => avisos.push(a.val())); 
            if(!falando) rotate(); 
        });

        function rotate() {
            if(falando || avisos.length === 0) return;
            document.getElementById('tela-aviso').style.display = 'flex';
            document.getElementById('txt-aviso').innerText = avisos[idxA].texto;
            
            setTimeout(() => { 
                idxA = (idxA + 1) % avisos.length; 
                if(!falando) rotate(); 
            }, 8000); // 8 segundos por aviso
        }
    </script>
</body>
</html>
