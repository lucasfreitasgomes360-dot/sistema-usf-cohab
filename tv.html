<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF COHAB</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #002b5c; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .topo { background: #001a38; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ffcc00; }
        .unidade-nome h1 { font-size: 1.8rem; margin: 0; color: white; font-weight: 900; }
        .unidade-nome p { font-size: 1.1rem; margin: 2px 0 0 0; color: #ffcc00; font-weight: bold; }
        .chamada-principal { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #nome-chamado { font-size: 8rem; font-weight: 900; color: #ffcc00; margin: 0; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        #local-chamado { font-size: 4rem; background: white; color: #002b5c; padding: 10px 50px; border-radius: 50px; font-weight: 900; margin-top: 20px; }
        .barra-avisos { height: 120px; background: white; color: #333; display: flex; align-items: center; position: relative; border-top: 5px solid #ffcc00; }
        #texto-info { font-size: 2.5rem; font-weight: 900; width: 100%; text-align: center; color: #002b5c; }
    </style>
</head>
<body>
    <div class="topo">
        <div class="unidade-nome">
            <h1>USF COHAB</h1>
            <p>Dr. João Pereira da Rosa</p>
        </div>
        <div id="relogio" style="font-size: 2.5rem; font-weight: 900;">00:00:00</div>
    </div>

    <div class="chamada-principal">
        <h1 id="nome-chamado">AGUARDANDO</h1>
        <div id="local-chamado">SISTEMA ATIVO</div>
    </div>

    <div class="barra-avisos" id="card-cor">
        <div id="texto-info">Bem-vindos à USF COHAB</div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Lógica de monitoramento da fila e avisos simplificada para o exemplo
        database.ref('fila').on('child_added', snap => {
            const data = snap.val();
            document.getElementById('nome-chamado').innerText = data.nome;
            document.getElementById('local-chamado').innerText = data.local;
            // Adicionar lógica de voz aqui se desejar
        });

        setInterval(() => { 
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);
    </script>
</body>
</html>
