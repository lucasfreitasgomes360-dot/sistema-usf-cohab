<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV USF COHAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002b5c; --accent: #ffcc00; --red: #d9534f; --cor-dinamica: #28a745; }
        body { margin: 0; background: var(--primary); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 40px; border-bottom: 4px solid var(--accent); background: #fff; color: var(--primary); height: 65px; }
        
        /* ÁREA DA CHAMADA */
        .container { flex: 1; display: flex; flex-direction: column; position: relative; justify-content: center; align-items: center; padding: 0 20px; text-align: center; }
        
        #nome { 
            width: 100%;
            max-width: 95vw;
            font-size: clamp(3rem, 15vw, 9rem); 
            color: var(--accent); 
            font-weight: 900; 
            text-shadow: 4px 4px 15px rgba(0,0,0,0.4); 
            margin: 0; 
            line-height: 1;
        }

        .box-local { background: white; color: var(--primary); padding: 10px 60px; border-radius: 50px; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; margin-top: 20px; text-transform: uppercase; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }

        /* HISTÓRICO INFERIOR COMPACTO */
        .history-bar { background: rgba(0,0,0,0.4); height: 100px; display: flex; align-items: center; padding: 0 20px; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .hist-label { writing-mode: vertical-lr; text-transform: uppercase; font-size: 0.6rem; font-weight: 900; opacity: 0.5; transform: rotate(180deg); }
        .hist-item { background: white; color: var(--primary); min-width: 220px; height: 75px; padding: 5px 15px; border-radius: 10px; border-bottom: 5px solid var(--accent); display: flex; flex-direction: column; justify-content: center; animation: slideUp 0.5s ease-out; }
        .hist-item b { font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .hist-item small { color: var(--red); font-size: 0.85rem; font-weight: 900; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* AVISO GRANDE COM BARRA DE PROGRESSÃO */
        .aviso-overlay { position: absolute; inset: 0; background: rgba(0,43,92,0.98); display: none; align-items: center; justify-content: center; z-index: 10; }
        .aviso-card { 
            background: white; 
            color: #333; 
            width: 85%; 
            padding: 60px; 
            border-radius: 30px; 
            text-align: center; 
            border-left: 20px solid var(--cor-dinamica); 
            position: relative; 
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #txt-aviso { font-size: 4.5rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; background: #eee; }
        .progress-bar { height: 100%; background: var(--cor-dinamica); width: 100%; transition: width 8s linear; }

        #setup-som { position:fixed; inset:0; background:var(--primary); z-index:9999; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="setup-som">
        <button onclick="iniciarSom()" style="padding:30px 60px; font-size:2rem; font-weight:900; cursor:pointer; border-radius:20px; border:none; background:var(--accent); color:var(--primary);">🔊 ATIVAR SOM DA TV</button>
    </div>

    <div class="header">
        <div><h1 style="margin:0; font-size:1.8rem; font-weight:900;">USF COHAB</h1><small style="color:var(--red); font-weight:900;">DR. JOÃO PEREIRA DA ROSA</small></div>
        <div id="relogio" style="font-size: 2.2rem; font-weight: 900;">00:00:00</div>
    </div>

    <div class="container">
        <h1 id="nome">AGUARDANDO</h1>
        <div class="box-local" id="local">SISTEMA ATIVO</div>
        
        <div class="aviso-overlay" id="tela-aviso">
            <div class="aviso-card">
                <div id="txt-aviso"></div>
                <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
            </div>
        </div>
    </div>

    <div class="history-bar">
        <div class="hist-label">HISTÓRICO</div>
        <div id="historico" style="display: flex; gap: 12px; overflow: hidden;"></div>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = { databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));
        const inicio = Date.now();
        let fila = [], falando = false, avisos = [], idxA = 0;

        window.iniciarSom = () => { 
            document.getElementById('setup-som').style.display='none';
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Voz ativada"));
        };

        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
        
        onValue(ref(db, 'config/corAviso'), (s) => { 
            if(s.val()) document.documentElement.style.setProperty('--cor-dinamica', s.val()); 
        });

        onChildAdded(ref(db, 'fila'), (s) => { 
            if (s.val().timestamp > inicio) { fila.push(s.val()); processar(); } 
        });

        async function processar() {
            if (falando || fila.length === 0) return;
            falando = true;
            document.getElementById('tela-aviso').style.display = 'none';
            const d = fila.shift();
            
            document.getElementById('nome').innerText = d.nome;
            document.getElementById('local').innerText = d.local;
            
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<b>${d.nome}</b><small>${d.local}</small>`;
            const histCont = document.getElementById('historico');
            histCont.insertBefore(item, histCont.firstChild);
            if(histCont.children.length > 6) histCont.removeChild(histCont.lastChild);

            document.getElementById('bell').play();

            setTimeout(() => {
                let loc = d.local.toUpperCase();
                let prep = (loc.includes("TRIAGEM") || loc.includes("RECEPÇÃO") || loc.includes("SALA") || loc.includes("ODONTOLOGIA") || loc.includes("VACINA") || loc.includes("COLETA")) ? "à" : "ao";
                let frase = (d.tipo === 'SENHA') ? `Senha ${d.nome}. Dirija-se ${prep} ${d.local}` : `Paciente ${d.nome}. Dirija-se ${prep} ${d.local}`;

                const v = new SpeechSynthesisUtterance(frase);
                v.lang = 'pt-BR'; v.rate = 0.9;
                v.onend = () => { 
                    setTimeout(() => { 
                        falando = false; 
                        if(fila.length > 0) processar(); else rotate(); 
                    }, 3000); 
                };
                window.speechSynthesis.speak(v);
            }, 1200);
        }

        onValue(ref(db, 'avisos'), (s) => { 
            avisos = []; 
            s.forEach(a => avisos.push(a.val())); 
            if(!falando) rotate(); 
        });

        function rotate() {
            if(falando || avisos.length === 0) { 
                document.getElementById('tela-aviso').style.display='none'; 
                return; 
            }
            
            const bar = document.getElementById('p-bar');
            document.getElementById('tela-aviso').style.display = 'flex';
            document.getElementById('txt-aviso').innerText = avisos[idxA].texto;
            
            // Reinicia a barra
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = 'width 8s linear';
                bar.style.width = '0%';
            }, 100);

            setTimeout(() => { 
                idxA = (idxA + 1) % avisos.length; 
                if(!falando) rotate(); 
            }, 8100);
        }
    </script>
</body>
</html>
