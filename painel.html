<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel USF COHAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
        }
        
        .glass-card { 
            background: white; 
            width: 100%; max-width: 480px; 
            border-radius: 30px; 
            padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,43,92,0.15);
            border: 1px solid #fff;
        }

        .main-title { 
            color: #002b5c; text-align: center; 
            font-weight: 900; font-size: 1.8rem; margin: 0;
            text-transform: uppercase; letter-spacing: -1px;
        }

        .sub-title { 
            color: #d9534f; text-align: center; 
            font-weight: 700; font-size: 0.8rem; margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; font-size: 0.7rem; font-weight: 900; 
            color: #778ca3; margin-bottom: 8px; text-transform: uppercase;
            padding-left: 5px;
        }

        select, input, textarea { 
            width: 100%; padding: 15px; border-radius: 15px;
            border: 2px solid #e1e8ed; background: #f8f9fa;
            font-size: 1rem; font-family: inherit; font-weight: 600;
            box-sizing: border-box; transition: 0.3s;
        }

        select:focus, input:focus { 
            border-color: #002b5c; background: #fff; outline: none;
            box-shadow: 0 10px 20px rgba(0,43,92,0.05);
        }

        /* BOTÕES ESTILO APP */
        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            font-weight: 900; font-size: 0.9rem; text-transform: uppercase;
            cursor: pointer; margin-top: 12px; color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-blue { 
            background: linear-gradient(135deg, #002b5c 0%, #0056b3 100%);
            box-shadow: 0 8px 20px rgba(0,43,92,0.3);
        }

        .btn-orange { 
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            box-shadow: 0 8px 20px rgba(230,126,34,0.3);
        }

        .btn-green { 
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            box-shadow: 0 8px 20px rgba(39,174,96,0.3);
        }

        .btn:hover { transform: translateY(-4px); filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); }

        .btn-outline { 
            background: transparent; color: #d9534f; border: 2px solid #d9534f;
            margin-top: 40px; font-size: 0.7rem;
        }

        /* Espelho Recepção */
        .mirror-container { 
            background: #f1f4f8; padding: 20px; border-radius: 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }

        .mirror-card { text-align: center; }
        .mirror-label { font-size: 0.6rem; font-weight: 800; color: #a1acc1; }
        .mirror-number { font-size: 2.2rem; font-weight: 900; color: #002b5c; display: block; }

        /* Lista de Avisos Gerência */
        .aviso-pill {
            background: #fff; padding: 12px; border-radius: 12px;
            margin-top: 8px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #e1e8ed; font-size: 0.85rem;
            font-weight: 600;
        }

        .del-x { 
            background: #ffeded; color: #eb4d4b; border: none;
            width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
            font-weight: 900;
        }

        .step-panel { display: none; animation: slideUp 0.4s ease; }
        .step-panel.active { display: block; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header">
        <h1 class="main-title">USF COHAB</h1>
        <p class="sub-title">Dr. João Pereira da Rosa</p>
    </div>

    <div class="input-group">
        <label>Selecione seu Setor</label>
        <select id="menu-setor" onchange="toggleSetor()">
            <option value="">Escolher...</option>
            <option value="acolhimento">Acolhimento</option>
            <option value="recepcao">Recepção</option>
            <option value="atendimento">Atendimento/Médico</option>
            <option value="gerencia">Gerência</option>
        </select>
    </div>

    <div id="setor-acolhimento" class="step-panel">
        <label>Sincronizar Contador</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="syncN" placeholder="Normal">
            <input type="number" id="syncP" placeholder="Pref">
        </div>
        <button class="btn btn-green" onclick="sync()">Salvar Contadores</button>
        <hr style="margin:25px 0; border:0; border-top: 1px solid #eee;">
        <button class="btn btn-blue" onclick="callT('NORMAL', 'ACOLHIMENTO')">Chamar Normal</button>
        <button class="btn btn-orange" onclick="callT('PREF', 'ACOLHIMENTO')">Chamar Preferencial</button>
    </div>

    <div id="setor-recepcao" class="step-panel">
        <div class="mirror-container">
            <div class="mirror-card">
                <span class="mirror-label">NORMAL</span>
                <span class="mirror-number" id="mirror-n">000</span>
            </div>
            <div class="mirror-card">
                <span class="mirror-label" style="color:#e67e22">PREF</span>
                <span class="mirror-number" id="mirror-p" style="color:#e67e22">000</span>
            </div>
        </div>
        <label>Escolha o Guichê</label>
        <select id="guiche-rep">
            <option value="GUICHÊ 01">Guichê 01</option>
            <option value="GUICHÊ 02">Guichê 02</option>
            <option value="GUICHÊ 03">Guichê 03</option>
        </select>
        <button class="btn btn-blue" onclick="callT('NORMAL', 'guiche-rep')">Chamar Normal</button>
        <button class="btn btn-orange" onclick="callT('PREF', 'guiche-rep')">Chamar Preferencial</button>
    </div>

    <div id="setor-atendimento" class="step-panel">
        <label>Sua Sala</label>
        <input type="text" id="sala-med" placeholder="Ex: Sala 04">
        <label>Nome do Paciente</label>
        <input type="text" id="nome-med" placeholder="Nome Completo">
        <button class="btn btn-blue" onclick="callN('nome-med', 'sala-med')">Chamar Paciente</button>
    </div>

    <div id="setor-gerencia" class="step-panel">
        <label>Cor de Fundo (Avisos TV)</label>
        <input type="color" id="cor-aviso" style="height:50px; cursor:pointer" value="#002b5c" onchange="mudarCor()">
        
        <label>Novo Informativo</label>
        <textarea id="msg-aviso" rows="3" placeholder="Digite aqui..."></textarea>
        <button class="btn btn-green" onclick="addA()">Publicar na TV</button>

        <label style="margin-top:20px;">Avisos Ativos</label>
        <div id="lista-avisos"></div>
        
        <button class="btn btn-outline" onclick="resetSistema()">Zerar Tudo</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, runTransaction, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyA5tayYNLD_P_ZnlWhst81Dkuz8gDv7vPU",
        authDomain: "sistema-usf-cohab.firebaseapp.com",
        databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com",
        projectId: "sistema-usf-cohab"
    };
    const app = initializeApp(config);
    const db = getDatabase(app);

    onValue(ref(db, 'contadores'), (s) => {
        const d = s.val() || {normal:0, pref:0};
        document.getElementById('mirror-n').innerText = String(d.normal).padStart(3,'0');
        document.getElementById('mirror-p').innerText = String(d.pref).padStart(3,'0');
    });

    onValue(ref(db, 'avisos'), (s) => {
        const lista = document.getElementById('lista-avisos');
        lista.innerHTML = "";
        s.forEach(child => {
            const item = document.createElement('div');
            item.className = 'aviso-pill';
            item.innerHTML = `<span>${child.val().texto}</span><button class="del-x" onclick="window.delA('${child.key}')">×</button>`;
            lista.appendChild(item);
        });
    });

    window.toggleSetor = () => {
        const v = document.getElementById('menu-setor').value;
        document.querySelectorAll('.step-panel').forEach(e => e.classList.remove('active'));
        if(v) document.getElementById('setor-'+v).classList.add('active');
    };

    window.sync = () => {
        set(ref(db, 'contadores'), { 
            normal: parseInt(document.getElementById('syncN').value)||0, 
            pref: parseInt(document.getElementById('syncP').value)||0 
        });
        alert("Sincronizado!");
    };

    window.callT = (tipo, localId) => {
        const local = document.getElementById(localId)?.value || localId;
        runTransaction(ref(db, 'contadores/'+tipo.toLowerCase()), (c) => (c || 0) + 1).then(r => {
            push(ref(db, 'fila'), { 
                nome: String(r.snapshot.val()).padStart(3,'0'), 
                local, 
                tipo: tipo==='PREF'?'senha_pref':'senha_normal', 
                timestamp: Date.now() 
            });
        });
    };

    window.callN = (inp, sel) => {
        const nome = document.getElementById(inp).value.toUpperCase();
        const local = document.getElementById(sel).value || sel;
        if(!nome) return alert("Digite o nome!");
        push(ref(db, 'fila'), { nome, local, tipo: 'paciente', timestamp: Date.now() });
        document.getElementById(inp).value = "";
    };

    window.addA = () => {
        const texto = document.getElementById('msg-aviso').value;
        if(texto) { push(ref(db, 'avisos'), { texto }); document.getElementById('msg-aviso').value=""; }
    };

    window.delA = (key) => { remove(ref(db, 'avisos/' + key)); };
    window.mudarCor = () => { set(ref(db, 'config/corAviso'), document.getElementById('cor-aviso').value); };

    window.resetSistema = () => {
        if(confirm("Deseja zerar tudo?")) {
            set(ref(db, 'contadores'), {normal:0, pref:0});
            remove(ref(db, 'fila'));
        }
    };
</script>

</body>
</html>
