<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - USF COHAB</title>
    <style>
        :root { --primary: #002b5c; --red: #d9534f; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); padding: 25px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 1.6rem; font-weight: 900; }
        .header h2 { color: var(--red); margin: 0; font-size: 0.9rem; font-weight: bold; }
        
        label { display: block; font-weight: bold; color: var(--primary); margin: 15px 0 5px; font-size: 0.8rem; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        .step { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-call { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-pref { background: #f0ad4e; }
        .btn-sync { background: #28a745; }
        .btn-danger { background: #dc3545; font-size: 0.7rem; margin-top: 25px; opacity: 0.8; }
        
        .grid-sync { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>USF COHAB</h1> 
            <h2>Dr. João Pereira da Rosa</h2>
        </div>

        <label>SELECIONE O SETOR DE TRABALHO</label>
        <select id="menu-setor" onchange="mudarSetor()">
            <option value="">-- Clique aqui para escolher --</option>
            <option value="acolhimento">🎫 ACOLHIMENTO</option>
            <option value="recepcao">🏢 RECEPÇÃO (GUICHÊS)</option>
            <option value="medico">👨‍⚕️ CONSULTÓRIO MÉDICO</option>
            <option value="enfermagem">👩‍⚕️ ENFERMAGEM / TRIAGEM</option>
            <option value="odonto">🦷 ODONTOLOGIA</option>
            <option value="social">🤝 ASSISTENTE SOCIAL</option>
            <option value="gerencia">⚙️ GERÊNCIA / AVISOS</option>
        </select>

        <div id="setor-acolhimento" class="step">
            <label>SINCRONIZAR SENHAS</label>
            <div class="grid-sync">
                <input type="number" id="syncN" placeholder="Normal">
                <input type="number" id="syncP" placeholder="Pref">
            </div>
            <button class="btn-call btn-sync" onclick="sync()">✅ ATUALIZAR CONTADOR</button>
            <hr>
            <button class="btn-call" onclick="callT('NORMAL', 'ACOLHIMENTO')">CHAMAR NORMAL</button>
            <button class="btn-call btn-pref" onclick="callT('PREF', 'ACOLHIMENTO')">CHAMAR PREFERENCIAL</button>
        </div>

        <div id="setor-recepcao" class="step">
            <label>SELECIONE SEU GUICHÊ</label>
            <select id="guiche-rep">
                <option value="RECEPÇÃO 01">RECEPÇÃO 01</option>
                <option value="RECEPÇÃO 02">RECEPÇÃO 02</option>
                <option value="RECEPÇÃO 03">RECEPÇÃO 03</option>
            </select>
            <button class="btn-call" onclick="callT('NORMAL', 'guiche-rep')">CHAMAR NORMAL</button>
            <button class="btn-call btn-pref" onclick="callT('PREF', 'guiche-rep')">CHAMAR PREFERENCIAL</button>
            <button class="btn-call btn-danger" onclick="resetSistema()">⚠️ ZERAR SENHAS DO DIA</button>
        </div>

        <div id="setor-medico" class="step">
            <label>LOCAL (EX: SALA 04)</label>
            <input type="text" id="sala-med" placeholder="Ex: CONSULTÓRIO 01">
            <label>NOME DO PACIENTE</label>
            <input type="text" id="nome-med" placeholder="NOME COMPLETO">
            <button class="btn-call" onclick="callN('nome-med', 'sala-med')">CHAMAR PACIENTE</button>
        </div>
        
        <div id="setor-enfermagem" class="step">
            <label>LOCAL</label>
            <select id="sala-enf">
                <option value="TRIAGEM">TRIAGEM</option>
                <option value="SALA DE VACINA">SALA DE VACINA</option>
                <option value="SALA DE CURATIVO">SALA DE CURATIVO</option>
            </select>
            <label>NOME DO PACIENTE</label>
            <input type="text" id="nome-enf" placeholder="NOME COMPLETO">
            <button class="btn-call" onclick="callN('nome-enf', 'sala-enf')">CHAMAR PACIENTE</button>
        </div>

        <div id="setor-odonto" class="step">
            <label>NOME DO PACIENTE</label>
            <input type="text" id="nome-odonto" placeholder="NOME COMPLETO">
            <button class="btn-call" onclick="callN('nome-odonto', 'SALA DE ODONTO')">CHAMAR ODONTO</button>
        </div>

        <div id="setor-social" class="step">
            <label>NOME DO PACIENTE</label>
            <input type="text" id="nome-social" placeholder="NOME COMPLETO">
            <button class="btn-call" onclick="callN('nome-social', 'ASSISTENTE SOCIAL')">CHAMAR SOCIAL</button>
        </div>

        <div id="setor-gerencia" class="step">
            <label>TEXTO DO INFORMATIVO (TV)</label>
            <textarea id="msg-aviso" rows="3"></textarea>
            <button class="btn-call" onclick="addA()">PUBLICAR NA TV</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5tayYNLD_P_ZnlWhst81Dkuz8gDv7vPU",
            authDomain: "sistema-usf-cohab.firebaseapp.com",
            databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com",
            projectId: "sistema-usf-cohab",
            storageBucket: "sistema-usf-cohab.firebasestorage.app",
            messagingSenderId: "184566338840",
            appId: "1:184566338840:web:995a701e4c787be2927a6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.mudarSetor = () => {
            const val = document.getElementById('menu-setor').value;
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            if(val) document.getElementById('setor-' + val).classList.add('active');
        };

        window.sync = () => {
            const vals = { normal: parseInt(document.getElementById('syncN').value) || 0, pref: parseInt(document.getElementById('syncP').value) || 0 };
            set(ref(db, 'contadores'), vals);
            alert("Senhas sincronizadas!");
        };

        window.callT = (tipo, localInput) => {
            const local = document.getElementById(localInput) ? document.getElementById(localInput).value : localInput;
            const p = ref(db, 'contadores/' + tipo.toLowerCase());
            runTransaction(p, (c) => (c || 0) + 1).then(r => {
                const num = String(r.snapshot.val()).padStart(3, '0');
                push(ref(db, 'fila'), { 
                    nome: num, 
                    local: local, 
                    tipo: tipo === 'PREF' ? 'senha_pref' : 'senha_normal' 
                });
            });
        };

        window.callN = (inp, sel) => {
            const nome = document.getElementById(inp).value.toUpperCase();
            const local = document.getElementById(sel).value || document.getElementById(sel).innerText || sel;
            if(!nome) return alert("Por favor, digite o nome!");
            push(ref(db, 'fila'), { nome, local, tipo: 'paciente' });
            document.getElementById(inp).value = "";
        };

        window.addA = () => {
            const texto = document.getElementById('msg-aviso').value;
            if(texto) { push(ref(db, 'avisos'), { texto }); alert("Aviso enviado!"); document.getElementById('msg-aviso').value = ""; }
        };

        window.resetSistema = () => {
            if (prompt("Senha de segurança (usfcohab):") === "usfcohab") {
                set(ref(db, 'contadores'), { normal: 0, pref: 0 });
                remove(ref(db, 'fila'));
                alert("Sistema zerado!");
            }
        };
    </script>
</body>
</html>
