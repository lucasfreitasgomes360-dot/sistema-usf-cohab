<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chamador - USF COHAB</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #007bff; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border-top: 10px solid var(--primary); }
        .header-unidade { text-align: center; margin-bottom: 25px; }
        .header-unidade h2 { color: var(--primary); margin: 0; }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: var(--secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-unidade">
            <h2>USF COHAB</h2>
            <small>Painel Dr. João Pereira da Rosa</small>
        </div>

        <label>Selecione seu Setor:</label>
        <select id="setorUsuario">
            <option value="RECEPÇÃO">RECEPÇÃO</option>
            <option value="CONSULTÓRIO 01">CONSULTÓRIO 01</option>
            <option value="CONSULTÓRIO 02">CONSULTÓRIO 02</option>
            <option value="TRIAGEM">TRIAGEM</option>
        </select>

        <hr>
        <input type="text" id="nomePaciente" placeholder="Nome do Paciente">
        <button onclick="chamarPaciente()">CHAMAR PACIENTE</button>

        <div id="historicoLocal" style="margin-top:20px; font-size:0.9rem; color:#666;">
            <b>Seu histórico recente:</b>
            <div id="listaHist"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sistema-usf-cohab-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function chamarPaciente() {
            const nome = document.getElementById('nomePaciente').value.toUpperCase();
            const local = document.getElementById('setorUsuario').value;
            if(!nome) return alert("Digite o nome");

            database.ref('fila').push({
                nome: nome,
                local: local,
                timestamp: Date.now()
            });

            const item = document.createElement('div');
            item.innerText = `${new Date().toLocaleTimeString()} - ${nome}`;
            document.getElementById('listaHist').prepend(item);
            document.getElementById('nomePaciente').value = "";
        }
    </script>
</body>
</html>
